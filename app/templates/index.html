<!DOCTYPE html>
<html>
<head>
    <title>Search Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">CPP AI Chatbot</div>

        <div class="chat-messages">
            <div class="message bot-message">
                Hi! Ask me a question.
            </div>

            {% if answer %}
                <div class="message user-message">
                    {{ request.form.get('corpus_question') }}
                </div>
                <div class="message bot-message">
                    {{ answer }}
                </div>
            {% endif %}
        </div>

        <form method="POST" action="/ask" class="chat-form">
            <input type="text" name="corpus_question" placeholder="Type your question here...">
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
