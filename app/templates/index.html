<!DOCTYPE html>
<html>
    <head>
        <title>Search Page</title>
    </head>
    <body>
        <h2>Ask a Question</h2>
        <form method="POST" action="/ask">
            <input type="text" name="corpus_question" placeholder="What do you want to know?">
            <button type="submit">Submit</button>
        </form>

        {% if answer %}
            <h3>Answer:</h3>
            <p>{{answer}}</p>
        {% endif %}
    </body>
</html>
