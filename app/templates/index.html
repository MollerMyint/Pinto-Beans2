<!DOCTYPE html>
<html>
<head>
    <title>BillyBeans Bot</title>

    <!-- App stylesheet, Google Font, Google Material Symbols -->
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫘</text></svg>">
</head>
<body>
    <!-- ======APP LAYOUT====== -->
    <div class="app-container">

        <!-- ======SIDEBAR====== -->
        <div class="sidebar">

            <!-- Logo, app name, sidebar collapse -->
            <div class="sidebar-header">
                <div class="logo">🫘</div>
                <span class="app-name">BillyBeans Bot</span>
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <span class="material-symbols-outlined">side_navigation</span>
                </button>
            </div>

            <!-- Button to start a new unsaved chat -->
            <button class="new-chat-btn" id="new-chat-btn" data-tooltip="New Chat">
                <span class="material-symbols-outlined">chat_add_on</span>
                <span>New Chat</span>
            </button>

            <!-- Search button -->
            <button class="search-btn" id="search-btn" data-tooltip="Search Chats">
                <span class="material-symbols-outlined">search</span>
                <span>Search chats</span>
            </button>

            <!-- Chat history list — populated dynamically from the database -->
            <div class="chat-history" id="chat-history">
            </div>

            <!-- Account popup — sits above the user bar -->
            <div class="account-popup" id="account-popup">
                <a href="/account" class="account-popup-item" id="account-btn">
                    <span class="material-symbols-outlined account-popup-icon-mat">account_circle</span>
                    Account
                </a>
                    <button class="account-popup-item account-popup-logout" id="popup-logout-btn">
                    <span class="material-symbols-outlined account-popup-icon-mat">logout</span>
                    Log out
                </button>
            </div>

            <!-- User bar at the bottom of the sidebar -->
            <button class="user-bar" id="user-bar-btn" data-tooltip="Account">
                <img src="{{ url_for('static', filename='BillyBronco.png') }}" class="user-avatar" alt="BillyBronco">
                <span class="user-greeting">Hello, {{ username }}!</span>
                <span class="material-symbols-outlined user-bar-chevron">expand_less</span>
            </button>

        </div>

        <!-- ======MAIN CHAT AREA====== -->
        <div class="chat-container" id="chat-container">

            <!-- Displays the current chat's name -->
            <div class="chat-header" id="chat-header">
                <span id="chat-header-title">New Chat</span>
                <a href="https://discord.gg/sK95vvE7G9" 
                target="_blank" 
                rel="noopener noreferrer"
                class="discord-btn"
                data-tooltip="Open in Discord">
                    <!-- Official Discord logo SVG -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36" width="22" height="22" fill="currentColor">
                        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
                    </svg>
                </a>
            </div>

            <!-- ======LANDING VIEW====== -->
            <!-- Shown at the start of every new chat; hidden after first message -->
            <div class="landing-view" id="landing-view">

                <!-- Greeting text -->
                <div class="landing-greeting" id="landing-greeting">
                    <span class="landing-logo">🫘</span>
                    <h1 id="landing-title">Hello, {{ username }}!</h1>
                    <p>What can I help you with today?</p>
                </div>

                <!-- Centered input form (only shown in landing mode) -->
                <form id="chat-form-landing" class="chat-form landing-form">
                    <textarea
                        id="corpus_question_landing"
                        placeholder="Type your question here..."
                        rows="1"></textarea>
                    <button type="submit">
                        <div class="svg-wrapper-1">
                            <div class="svg-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                                <path fill="none" d="M0 0h24v24H0z"></path>
                                <path fill="currentColor" d="M1.946 9.315c-.522-.174-.527-.455.01-.634l19.087-6.362c.529-.176.832.12.684.638l-5.454 19.086c-.15.529-.455.547-.679.045L12 14l6-8-8 6-8.054-2.685z"></path>
                            </svg>
                            </div>
                        </div>
                        <span>Send</span>
                    </button>
                </form>

                <!-- Suggestion chips shown below the landing input -->
                <div class="landing-suggestions" id="landing-suggestions"></div>
            </div>

            <!-- ======CHAT VIEW====== -->
            <!-- Hidden during landing mode; shown after first message -->

            <!-- Scrollable message feed where bot and user messages appear -->
            <div class="chat-messages" id="chat-messages" style="display: none;"></div>

            <!-- User input form (anchored to bottom in chat mode) -->
            <form id="chat-form" class="chat-form" style="display: none;">
                <textarea
                    id="corpus_question"
                    name="corpus_question"
                    placeholder="Type your question here..."
                    rows="1"
                    required></textarea>

                <!-- Send button with animated paper plane icon -->
                <button type="submit">
                    <div class="svg-wrapper-1">
                        <div class="svg-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                            <path fill="none" d="M0 0h24v24H0z"></path>
                            <path fill="currentColor" d="M1.946 9.315c-.522-.174-.527-.455.01-.634l19.087-6.362c.529-.176.832.12.684.638l-5.454 19.086c-.15.529-.455.547-.679.045L12 14l6-8-8 6-8.054-2.685z"></path>
                        </svg>
                        </div>
                    </div>
                    <span>Send</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ======RENAME POPUP====== -->
    <div id="rename-popup" class="popup">
        <div class="popup-content">
            <h3>Rename Chat</h3>
            <input type="text" id="rename-input" class="popup-input" placeholder="Enter new chat name...">
            <div class="popup-buttons">
                <button class="popup-btn cancel-btn" id="cancel-rename">Cancel</button>
                <button class="popup-btn confirm-btn" id="confirm-rename">Rename</button>
            </div>
        </div>
    </div>

    <!-- ====== DELETE CONFIRMATION POPUP====== -->
    <div id="delete-popup" class="popup">
        <div class="popup-content">
            <h3>Delete Chat</h3>
            <p>Are you sure you want to delete the following chat?</p>
            <p class="chat-to-delete"></p>
            <div class="popup-buttons">
                <button class="popup-btn cancel-btn" id="cancel-delete">No</button>
                <button class="popup-btn confirm-btn" id="confirm-delete">Yes</button>
            </div>
        </div>
    </div>

    <!-- ======SEARCH popup====== -->
    <div id="search-popup" class="search-popup">
        <div class="search-popup-content">
            <div class="search-input-row">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" id="search-input" placeholder="Search chats..." autocomplete="off">
                <button id="search-close" class="search-close">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="search-results" id="search-results"></div>
        </div>
    </div>

    <!-- marked.js: converts AI markdown responses into structured HTML -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

    <script>

    // DOM REFERENCES & STATE VARIABLES
    const form          = document.getElementById("chat-form");
    const input         = document.getElementById("corpus_question");
    const chatMessages  = document.getElementById("chat-messages");
    const newChatBtn    = document.getElementById("new-chat-btn");
    const chatHistory   = document.getElementById("chat-history");
    const chatHeader = document.getElementById("chat-header-title");

    // Landing-mode elements
    const landingView        = document.getElementById("landing-view");
    const landingForm        = document.getElementById("chat-form-landing");
    const landingInput       = document.getElementById("corpus_question_landing");
    const landingSuggestions = document.getElementById("landing-suggestions");

    let currentChatId = null;
    let isLanding     = true;   // true = landing screen is visible

    // Popup references
    const renamePopup      = document.getElementById("rename-popup");
    const renameInput      = document.getElementById("rename-input");
    const confirmRenameBtn = document.getElementById("confirm-rename");
    const cancelRenameBtn  = document.getElementById("cancel-rename");
    let chatToRename = null;

    const deletePopup      = document.getElementById("delete-popup");
    const confirmDeleteBtn = document.getElementById("confirm-delete");
    const cancelDeleteBtn  = document.getElementById("cancel-delete");
    let chatToDelete = null;

    //Sidebar
    const sidebar = document.querySelector('.sidebar');
    const sidebarToggleBtn = document.getElementById('sidebar-toggle');

    // SEARCH
    const searchBtn     = document.getElementById('search-btn');
    const searchpopup   = document.getElementById('search-popup');
    const searchInput   = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const searchClose   = document.getElementById('search-close');

    // Starting questions
    const FALLBACK_QUESTIONS = [
        "What clubs and organizations can I join?",
        "How do I change my major?",
        "What scholarship options are available?",
        "How do I register for classes?",
        "When is the deadline to apply for financial aid?",
        "What dining options are on campus?"
    ];

    // For user profile button at bottom of sidebar
    const userBarBtn    = document.getElementById('user-bar-btn');
    const accountPopup  = document.getElementById('account-popup');
    const popupLogoutBtn = document.getElementById('popup-logout-btn');

    // Tracks the last question asked so the regenerate button can re-send it
    let lastQuestion = null;
    let lastMessageId = null;

    // LANDING --> CHAT TRANSITIONS
    // exitLanding — fades out the landing view --> shows the chat UI
    function exitLanding(firstQuestion) {
        landingView.classList.add('hiding');
        setTimeout(() => {
            landingView.style.display = 'none';
            landingView.classList.remove('hiding');
            chatMessages.style.display = 'flex';
            form.style.display         = 'flex';
            isLanding = false;
            // Trigger actual submit with the captured question
            input.value = firstQuestion;
            form.dispatchEvent(new Event('submit'));
        }, 250);
    }

    // showLanding — resets everything back to the landing screen
    function showLanding() {
        isLanding = true;
        chatMessages.style.display = 'none';
        form.style.display         = 'none';
        landingView.style.display  = 'flex';
        landingView.classList.remove('hiding');
        landingInput.value       = '';
        landingInput.style.height = 'auto';
        chatMessages.innerHTML   = '';
        showStarterQuestions();
    }

    // LANDING FORM — submit & keyboard
    landingForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const question = landingInput.value.trim();
        if (!question) return;
        exitLanding(question);
    });

    landingInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            landingForm.dispatchEvent(new Event('submit'));
        }
    });

    // Auto-resize the landing textarea as the user types
    landingInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    // STARTER QUESTIONS
    // Shows starter questions at the beginning of new chat
    function showStarterQuestions() {
        landingSuggestions.innerHTML = FALLBACK_QUESTIONS.map(q =>
            `<button class="suggestion-chip">${q}</button>`
        ).join('');

        landingSuggestions.querySelectorAll('.suggestion-chip').forEach(btn => {
            btn.addEventListener('click', function() {
                exitLanding(this.textContent.trim());
            });
        });
    }

    // CHAT INPUT — auto-resize & keyboard shortcut
    input.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            form.dispatchEvent(new Event('submit'));
        }
    });

    // TIME-BASED GREETING
    function getGreeting() {
        const hour = new Date().getHours();
        if (hour < 12) return 'Good Morning';
        if (hour < 17) return 'Good Afternoon';
        return 'Good Evening';
    }

    document.getElementById('landing-title').textContent = `${getGreeting()}, {{ username }}!`;

    // SIDEBAR TOGGLE
    sidebarToggleBtn.addEventListener('click', function() {
        sidebar.classList.toggle('collapsed');
        const isCollapsed = sidebar.classList.contains('collapsed');
        sidebarToggleBtn.setAttribute('data-tooltip', isCollapsed ? 'Open Sidebar' : 'Close Sidebar');
        localStorage.setItem('sidebarCollapsed', isCollapsed);
    });

    // Restore saved sidebar state on page load
    if (localStorage.getItem('sidebarCollapsed') === 'true') {
        sidebar.classList.add('collapsed');
        sidebarToggleBtn.setAttribute('data-tooltip', 'Open Sidebar');
    } else {
        sidebarToggleBtn.setAttribute('data-tooltip', 'Close Sidebar');
    }

    // SEARCH — open popup and show all chats
    searchBtn.addEventListener('click', function() {
        searchpopup.classList.add('show');
        setTimeout(() => searchInput.focus(), 50);
        renderSearchResults('');
    });

    // SEARCH — close popup and reset state
    function closeSearch() {
        searchpopup.classList.remove('show');
        searchInput.value = '';
        searchResults.innerHTML = '';
    }

    searchClose.addEventListener('click', closeSearch);

    searchpopup.addEventListener('click', function(e) {
        if (e.target === searchpopup) closeSearch();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSearch();
    });

    // SEARCH — filter sidebar chats and render results with highlighted matches
    function renderSearchResults(query) {
        const items = document.querySelectorAll('.chat-history-item');
        const q = query.toLowerCase().trim();
        let html = '';
        let count = 0;

        items.forEach(item => {
            const title  = item.querySelector('.chat-name').textContent;
            const chatId = item.dataset.chatId;

            if (!q || title.toLowerCase().includes(q)) {
                const highlighted = q
                    ? title.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>')
                    : title;

                html += `
                    <div class="search-result-item" data-chat-id="${chatId}">
                        <span class="material-symbols-outlined">chat</span>
                        ${highlighted}
                    </div>`;
                count++;
            }
        });

        if (count === 0) {
            html = `<div class="search-empty">No chats found</div>`;
        }

        searchResults.innerHTML = html;

        // Click a result to close the popup and load that chat
        searchResults.querySelectorAll('.search-result-item').forEach(el => {
            el.addEventListener('click', function() {
                const chatId   = parseInt(this.dataset.chatId);
                const chatName = this.textContent.trim();
                closeSearch();
                loadChat(chatId, chatName);
            });
        });
    }

    // SEARCH — live filter as user types
    searchInput.addEventListener('input', function() {
        renderSearchResults(this.value);
    });

    // LOAD USER CHATS ON STARTUP
    // Fetches all saved chats from the database
    // and populates the sidebar history list
    async function loadUserChats() {
        try {
            const response = await fetch(`/user/chats`);
            const data     = await response.json();

            chatHistory.innerHTML = '';
            data.chats.forEach(chat => {
                addChatToSidebar(chat.chat_id, chat.title);
            });

            currentChatId          = null;
            chatHeader.textContent = 'New Chat';
            showLanding();

        } catch (error) {
            console.error('Error loading chats:', error);
        }
    }

    // ADD CHAT TO SIDEBAR
    // Creates a chat history row with a name,
    // Material Symbols icon, and rename/delete
    // options menu. Prepends for new chats,
    // appends for loaded history.
    function addChatToSidebar(chatId, title, prepend = false) {
        const chatItem = document.createElement('div');
        chatItem.className      = 'chat-history-item';
        chatItem.dataset.chatId = chatId;
        chatItem.innerHTML = `
            <span class="chat-icon material-symbols-outlined">chat</span>
            <span class="chat-name">${title}</span>
            <button class="chat-options-btn">
                <span class="material-symbols-outlined">more_vert</span>
            </button>
            <div class="chat-options-menu">
                <button class="option-rename">
                    <span class="material-symbols-outlined">edit</span>
                    Rename
                </button>
                <button class="option-delete">
                    <span class="material-symbols-outlined">delete</span>
                    Delete
                </button>
            </div>
        `;
        if (prepend) {
            chatHistory.prepend(chatItem);
        } else {
            chatHistory.appendChild(chatItem);
        }
        attachChatItemListeners(chatItem);
    }

    // ADD MESSAGE TO FEED
    // Renders a message bubble for either the
    // user or bot. Bot messages are parsed through
    // marked.js to render markdown (bold, lists,
    // links) and include copy + regenerate buttons
        function addMessage(text, sender) {
        const messageDiv     = document.createElement('div');
        messageDiv.className = `message ${sender}-message`;
        const parsedText     = marked.parse(text);

        if (sender === 'bot') {
            messageDiv.innerHTML = `
                <div class="message-text">${parsedText}</div>
                <div class="message-actions">
                    <button class="action-btn copy-btn" title="Copy">
                        <span class="material-symbols-outlined">content_copy</span>
                    </button>
                    <button class="action-btn regenerate-btn" title="Regenerate">
                        <span class="material-symbols-outlined">replay</span>
                    </button>
                </div>
            `;

            // Make all links in bot messages open in a new tab
            messageDiv.querySelectorAll('a').forEach(link => {
                link.setAttribute('target', '_blank');
                link.setAttribute('rel', 'noopener noreferrer');
            });

            // Copy button: copies plain text of the response to clipboard
            // and briefly shows a checkmark to confirm success
            messageDiv.querySelector('.copy-btn').addEventListener('click', function() {
                const textToCopy = messageDiv.querySelector('.message-text').innerText;
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const icon = this.querySelector('.material-symbols-outlined');
                    icon.textContent = 'check';
                    setTimeout(() => icon.textContent = 'content_copy', 2000);
                });
            });

            // Regenerate button: re-sends the last question to the API and replaces this message's content with the new response
            messageDiv.querySelector('.regenerate-btn').addEventListener('click', async function() {
                if (!currentChatId || !lastQuestion || !lastMessageId) return;

                this.disabled = true;
                const icon = this.querySelector('.material-symbols-outlined');
                icon.style.animation = 'spin 1s linear infinite';

                // Show loading state in the message bubble
                const messageText = messageDiv.querySelector('.message-text');
                const originalHTML = messageText.innerHTML;
                messageText.innerHTML = `
                    <div class="loader-wrapper">
                        <div class="loader"></div>
                        <div class="letter-wrapper">
                            <span class="loader-letter">T</span>
                            <span class="loader-letter">h</span>
                            <span class="loader-letter">i</span>
                            <span class="loader-letter">n</span>
                            <span class="loader-letter">k</span>
                            <span class="loader-letter">i</span>
                            <span class="loader-letter">n</span>
                            <span class="loader-letter">g</span>
                        </div>
                    </div>`;

                try {
                    const response = await fetch(`/change/message/${lastMessageId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question: lastQuestion })
                    });
                    const data = await response.json();

                    if (data.answer) {
                        messageText.innerHTML = marked.parse(data.answer);

                        // Re-apply new tab to any links in the regenerated response
                        messageDiv.querySelectorAll('a').forEach(link => {
                            link.setAttribute('target', '_blank');
                            link.setAttribute('rel', 'noopener noreferrer');
                        });
                    } else {
                        messageText.innerHTML = originalHTML;
                    }
                } catch (error) {
                    console.error('Regenerate failed:', error);
                    messageText.innerHTML = originalHTML;
                }

                this.disabled        = false;
                icon.style.animation = '';
            });

        } else {
            messageDiv.innerHTML = parsedText;
        }

        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Disable all regenerate buttons except last one
        if (sender === 'bot') updateRegenerateButtons();
    }

    // Disable all regenerate buttons except the most recent one
    function updateRegenerateButtons() {
        const allRegenBtns = chatMessages.querySelectorAll('.regenerate-btn');
        allRegenBtns.forEach((btn, index) => {
            if (index < allRegenBtns.length - 1) {
                btn.disabled       = true;
                btn.style.opacity  = '0.3';
                btn.style.cursor   = 'not-allowed';
            } else {
                btn.disabled       = false;
                btn.style.opacity  = '';
                btn.style.cursor   = '';
            }
        });
    }

    // CHAT ITEM LISTENERS
    // Attaches click handlers to each sidebar row
    // for loading the chat, toggling the options
    // menu, and triggering rename/delete popups
    function attachChatItemListeners(chatItem) {
        // Click the row to load that chat
        chatItem.addEventListener('click', function(e) {
            if (!e.target.closest('.chat-options-btn') &&
                !e.target.closest('.chat-options-menu')) {
                const chatId   = parseInt(this.dataset.chatId);
                const chatName = this.querySelector('.chat-name').textContent;
                loadChat(chatId, chatName);
            }
        });

        // Toggle the rename/delete dropdown menu
        const optionsBtn = chatItem.querySelector('.chat-options-btn');
        optionsBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const menu = this.nextElementSibling;

            // Close all other open menus
            document.querySelectorAll('.chat-options-menu').forEach(m => {
                if (m !== menu) m.classList.remove('show');
            });

            if (!menu.classList.contains('show')) {
                // Position the menu relative to the button on screen
                const rect = this.getBoundingClientRect();
                menu.style.top  = `${rect.bottom + 4}px`;
                menu.style.left = `${rect.left}px`;
            }

            menu.classList.toggle('show');
        });

        // Open the rename popup pre-filled with the current chat name
        const renameBtn = chatItem.querySelector('.option-rename');
        renameBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const chatNameSpan = chatItem.querySelector('.chat-name');
            chatToRename       = { element: chatNameSpan, chatId: chatItem.dataset.chatId };
            renameInput.value  = chatNameSpan.textContent;
            renamePopup.classList.add('show');
            setTimeout(() => renameInput.focus(), 100);
            this.closest('.chat-options-menu').classList.remove('show');
        });

        // Open the delete confirmation popup with the chat name
        const deleteBtn = chatItem.querySelector('.option-delete');
        deleteBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const chatName = chatItem.querySelector('.chat-name').textContent;
            chatToDelete   = { element: chatItem, chatId: chatItem.dataset.chatId };
            document.querySelector('.chat-to-delete').textContent = `"${chatName}"`;
            deletePopup.classList.add('show');
            this.closest('.chat-options-menu').classList.remove('show');
        });
    }

    // LOAD CHAT MESSAGES
    // Fetches and renders all messages for a
    // selected chat, highlighting it as active
    async function loadChat(chatId, chatName) {
        // If currently on the landing screen, exit it without a question
        if (isLanding) {
            landingView.style.display  = 'none';
            chatMessages.style.display = 'flex';
            form.style.display         = 'flex';
            isLanding = false;
        }

        currentChatId          = chatId;
        chatHeader.textContent = chatName;

        document.querySelectorAll('.chat-history-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`[data-chat-id="${chatId}"]`)?.classList.add('active');

        try {
            const response = await fetch(`/chats/${chatId}/messages`);
            const data     = await response.json();

            chatMessages.innerHTML = '';
            data.messages.forEach(msg => {
                addMessage(msg.question, 'user');
                addMessage(msg.answer, 'bot');
            });

            // Set lastQuestion and lastMessageId to the most recent message
            if (data.messages.length > 0) {
                lastQuestion  = data.messages[data.messages.length - 1].question;
                lastMessageId = data.messages[data.messages.length - 1].message_id;
            }

            if (data.messages.length === 0) {
                addMessage('Welcome to the BillyBeans Bot! Ask me a question.', 'bot');
            }
        } catch (error) {
            console.error('Error loading messages:', error);
        }
    }

    // NEW CHAT BUTTON
    // Resets the chat area to a blank state
    // without saving, if not already on a new chat
    newChatBtn.addEventListener('click', function() {
        // If already on a fresh landing screen, do nothing
        if (isLanding && currentChatId === null) return;

        currentChatId          = null;
        chatHeader.textContent = 'New Chat';
        document.querySelectorAll('.chat-history-item').forEach(i => i.classList.remove('active'));
        showLanding();
    });

    // FORM SUBMIT — SEND A MESSAGE
    // Saves the question for regeneration, shows
    // the thinking loader, then calls the backend.
    // First message creates a new chat; subsequent
    // messages append to the existing one.
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const question = input.value.trim();
        if (!question) return;

        lastQuestion = question;
        addMessage(question, 'user');

        input.value        = '';
        input.style.height = 'auto';

        const loadingMessage     = document.createElement('div');
        loadingMessage.className = 'message bot-message';
        loadingMessage.innerHTML = `
        <div class="loader-wrapper">
            <div class="loader"></div>
            <div class="letter-wrapper">
            <span class="loader-letter">T</span>
            <span class="loader-letter">h</span>
            <span class="loader-letter">i</span>
            <span class="loader-letter">n</span>
            <span class="loader-letter">k</span>
            <span class="loader-letter">i</span>
            <span class="loader-letter">n</span>
            <span class="loader-letter">g</span>
            </div>
        </div>`;
        chatMessages.appendChild(loadingMessage);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            if (!currentChatId) {
                // First message: create new chat with AI-generated title
                const response = await fetch('/new/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await response.json();

                currentChatId          = data.chat_id;
                chatHeader.textContent = data.title;
                lastMessageId          = data.message_id;
                addChatToSidebar(data.chat_id, data.title, true);
                document.querySelector(`[data-chat-id="${data.chat_id}"]`)?.classList.add('active');

                loadingMessage.remove();
                addMessage(data.answer, 'bot');

            } else {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, chat_id: currentChatId })
                });
                const data = await response.json();
                loadingMessage.remove();
                addMessage(data.answer, 'bot');
                lastMessageId = data.message_id;

            // Move active chat to top of sidebar
                const activeChatItem = document.querySelector(`[data-chat-id="${currentChatId}"]`);
                if (activeChatItem) chatHistory.prepend(activeChatItem);
            }
        } catch (error) {
            loadingMessage.textContent = 'Something went wrong. Please try again.';
            console.error(error);
        }
    });

    // RENAME POPUP HANDLERS
    // Confirms the rename by calling the backend
    // and updating the sidebar and header text
    confirmRenameBtn.addEventListener('click', async function() {
        const newTitle = renameInput.value.trim();
        if (chatToRename && newTitle) {
            try {
                await fetch(`/change/title/${chatToRename.chatId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle })
                });
                chatToRename.element.textContent = newTitle;
                if (currentChatId == chatToRename.chatId) chatHeader.textContent = newTitle;
            } catch (err) {
                console.error('Rename failed:', err);
            }
        }
        chatToRename       = null;
        renameInput.value  = '';
        renamePopup.classList.remove('show');
    });

    cancelRenameBtn.addEventListener('click', function() {
        chatToRename       = null;
        renameInput.value  = '';
        renamePopup.classList.remove('show');
    });

    // DELETE POPUP HANDLERS
    // Confirms deletion by calling the backend,
    // removes the row from the sidebar, and resets
    // to a new chat if the deleted one was active
    confirmDeleteBtn.addEventListener('click', async function() {
        if (chatToDelete) {
            try {
                await fetch(`/delete/chat/${chatToDelete.chatId}`, { method: 'DELETE' });
            } catch (err) {
                console.error('Delete failed:', err);
            }
            chatToDelete.element.remove();
            if (currentChatId == chatToDelete.chatId) {
                currentChatId          = null;
                chatHeader.textContent = 'New Chat';
                showLanding();
            }
        }
        chatToDelete = null;
        deletePopup.classList.remove('show');
    });

    cancelDeleteBtn.addEventListener('click', function() {
        chatToDelete = null;
        deletePopup.classList.remove('show');
    });

    // CLOSE POPUPS ON BACKGROUND CLICK
    // Clicking outside the popup card dismisses it
    renamePopup.addEventListener('click', function(e) {
        if (e.target === renamePopup) {
            chatToRename       = null;
            renameInput.value  = '';
            renamePopup.classList.remove('show');
        }
    });

    deletePopup.addEventListener('click', function(e) {
        if (e.target === deletePopup) {
            chatToDelete = null;
            deletePopup.classList.remove('show');
        }
    });

    // CLOSE DROPDOWN ON OUTSIDE CLICK
    // Hides any open options menus when clicking
    // anywhere else on the page
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.chat-options-btn') && !e.target.closest('.chat-options-menu')) {
            document.querySelectorAll('.chat-options-menu').forEach(menu => menu.classList.remove('show'));
        }
    });

    // Submit rename on Enter key
    renameInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') confirmRenameBtn.click();
    });

    // User profile button
    userBarBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        accountPopup.classList.toggle('show');
        userBarBtn.classList.toggle('open');
    });

    // Close popup when clicking elsewhere
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.user-bar') && !e.target.closest('.account-popup')) {
            accountPopup.classList.remove('show');
            userBarBtn.classList.remove('open');
        }
    });

    popupLogoutBtn.addEventListener('click', function() {
        window.location.href = '/logout';
    });

    // Initialize the app by loading the user's chat history
    loadUserChats();

    </script>
</body>
</html>
