<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up - BillyBeans Bot</title>
        <link rel="stylesheet" href="{{url_for('static', filename='auth.css')}}">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap">
    </head>
    <body>
        <div class="auth-container">
            <div class="auth-header">
                <span class="auth-logo">🫘</span>
                <h2>New? Create an account!</h2>
            </div>
            <h4>Please fill in your information</h4>
            <form method="POST" action="/signup">
                <input type="text" name="username" placeholder="Username" value="{{ username or '' }}">
                {% if username_error %}
                    <p class="error">{{username_error}}</p>
                {% endif %}
                <input type="text" name="email" placeholder="Email Address" value="{{ email or '' }}">
                {% if email_error %}
                    <p class="error">{{email_error}}</p>
                {% endif %}
                <input type="password" name="password" placeholder="Password">
                {% if error %}
                    <p class="error">{{error}}</p>
                {% endif %}
                <button type="submit">Submit</button>
                <button class="secondary" onclick="location.href='/login'" type="button">Back</button>
            </form>
        </div>
    </body>
</html>
